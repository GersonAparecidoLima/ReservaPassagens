version: '3.8'

services:
  # 1. Banco de Dados SQL Server
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: tickets_booking_sql
    ports:
      - "14330:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "SqlServer@2026!"
    volumes:
      - mssql_data:/var/opt/mssql
    networks:
      - booking_network

  # 2. Cache Redis
  redis:
    image: redis:alpine
    container_name: tickets_booking_redis
    ports:
      - "6379:6379"
    networks:
      - booking_network

  # 3. API .NET
  webapi:
    image: tickets-booking-api
    build:
      context: .
      dockerfile: src/TicketsBooking.API/Dockerfile
    container_name: tickets_booking_api
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: 8080
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=TicketsBookingDb;User Id=sa;Password=SqlServer@2026!;TrustServerCertificate=True;"
      Redis__ConnectionString: "redis:6379,abortConnect=false"
    depends_on:
      - sqlserver
      - redis
    networks:
      - booking_network

volumes:
  mssql_data:

networks:
  booking_network:
    driver: bridge