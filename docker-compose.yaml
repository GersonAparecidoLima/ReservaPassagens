version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: tickets_booking_sql
    ports:
      - "14330:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "SqlServer@2026!"
    volumes:
      - mssql_data:/var/opt/mssql
    networks:
      - booking_network

  redis:
    image: redis:alpine
    container_name: tickets_booking_redis
    ports:
      - "6379:6379"
    networks:
      - booking_network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: tickets_booking_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - booking_network

  webapi:
    image: tickets-booking-api
    build:
      context: .
      dockerfile: src/TicketsBooking.API/Dockerfile
    container_name: tickets_booking_api
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: 8080
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=TicketsBookingDb;User Id=sa;Password=SqlServer@2026!;TrustServerCertificate=True;"
      Redis__ConnectionString: "redis:6379,abortConnect=false"
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__Username: "guest"
      RabbitMQ__Password: "guest"
    depends_on:
      rabbitmq:
        condition: service_healthy
      sqlserver:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - booking_network

volumes:
  mssql_data:

networks:
  booking_network:
    driver: bridge